<head>

<body>
	<div id="topRowButtons">
		<div class="custom-select" type="buttons">

				<option onclick="console.log('terrain mode');" src="beckBtns/terrain.png" value="0"></option>
			</select>
		</div>
		<div class="custom-select" type="buttons">
			<select>
				<option src="beckBtns/add_entity.png" value="0"></option>
				<option onclick="console.log('clicked-player');" src="beckBtns/player.png" value="1"></option>

				<option onclick="console.log('clicked-npc');" src="beckBtns/npc.png" value="3"></option>
				<option onclick="console.log('clicked-object');" src="beckBtns/object.png" value="4"></option>
			</select>
		</div>
		<div class="custom-select" type="select" onchange="console.log( this.value )">
			<select>
				<option src="beckBtns/brush.png" value="0"></option>
				<option src="beckBtns/brush.png" value="0"></option>
				<option src="beckBtns/bucket.png" value="1"></option>
				<option src="beckBtns/eraser.png" value="2"></option>	
			</select>
		</div>
		<div class="custom-select" type="select" onchange="console.log( this.value )">
			<select>
				<option class="pixel-corners-6-6" src="textures/wud_16.png" value="0"></option>
				<option class="pixel-corners-4-6" src="textures/wud_16.png" value="0"></option>
				<option class="pixel-corners-4-6" src="textures/cr8_16.png" value="1"></option>
				<option class="pixel-corners-4-6" src="textures/drt_16.png" value="2"></option>
				<option class="pixel-corners-4-6" src="textures/grs_16.png" value="3"></option>
				<option class="pixel-corners-4-6" src="textures/snd_16.png" value="4"></option>
				<option class="pixel-corners-4-6" src="textures/wtr_16.png" value="5"></option>
				<option class="pixel-corners-4-6" src="textures/cbl_16.png" value="6"></option>
				<option class="pixel-corners-4-6" src="beckBtns/blk.png" value="7"></option>
			</select>
		</div>
	</div>
	<script src="world.js" type="module"></script>
	<script src="custom-select.js"></script>
	<script>
		HTMLCollection.prototype.forEach = function (x) {return Array.from(this).forEach(x);}
		function _(x) {return document.getElementById(x);}
		var _APP = globalThis._APP;

		_('topRightTools').children.forEach(btn => {
			btn.addEventListener('click', () => {
				_('topRightTools').children.forEach(x => x.classList.remove('active'));
				btn.classList.add('active');

				const mode = btn.getAttribute('mode');
				if (mode == 'terrain') {
					_('buildingTools').style.display = 'none';
					_('paintingTools').style.display = 'none';
					_('terrainTools').style.display = '';
				} else if (mode == 'build') {
					_('buildingTools').style.display = '';
					_('paintingTools').style.display = 'none';
					_('terrainTools').style.display = 'none';
				} else if (mode == 'paint') {
					_('buildingTools').style.display = 'none';
					_('paintingTools').style.display = '';
					_('terrainTools').style.display = 'none';
				} else if (mode == "drag") {
					_('buildingTools').style.display = 'none';
					_('paintingTools').style.display = 'none';
					_('terrainTools').style.display = 'none';
				} else {
					_('buildingTools').style.display = 'none';
					_('paintingTools').style.display = 'none';
					_('terrainTools').style.display = 'none';
				}
				_APP.setMouseMode(mode);
			})
		});

		_('paintingTools').querySelectorAll('BUTTON[mode]').forEach(btn => {
			btn.addEventListener('click', () => {
				_('paintingTools').children.forEach(x => x.classList.remove('active'));
				btn.classList.add('active');
				//_APP.setBuildingMode(mode);
			})
		});

		_('buildingTools').querySelectorAll('BUTTON[mode]').forEach(btn => {
			btn.addEventListener('click', () => {
				_('buildingTools').children.forEach(x => x.classList.remove('active'));
				btn.classList.add('active');
				//_APP.setBuildingMode(mode);
			})
		});

		function doubleCheckClear() {
			// if (confirm('Are you sure you want to clear the entire painted map?')) {
			// alert('clearing');
			// }
		}


	</script>
</body>

</html>
